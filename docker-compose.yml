services:
  # ─── Frontend (Next.js) ─────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        BACKEND_URL: http://backend:8000
    ports:
      - "3000:3000"
    environment:
      - BACKEND_URL=http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - delirium

  # ─── Backend (FastAPI) ──────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - backend_data:/app/data
      - ./backend/plugins:/app/plugins
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - delirium

  # ─── Redis (Cache + Pub/Sub) ────────────────────────────────
  redis:
    image: redis:7-alpine
    profiles: ["full"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - delirium

  # ─── Qdrant (Vector Database) ──────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    profiles: ["full"]
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - delirium

  # ─── Caddy (Reverse Proxy + Auto-SSL) ──────────────────────
  caddy:
    image: caddy:2-alpine
    profiles: ["full"]
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
    networks:
      - delirium

volumes:
  backend_data:
  redis_data:
  qdrant_data:
  caddy_data:
  caddy_config:

networks:
  delirium:
    driver: bridge
